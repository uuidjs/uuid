# Relevent docs:
# - https://github.com/googleapis/release-please
# - https://github.com/googleapis/release-please-action

on:
  workflow_dispatch:

  push:
    branches:
      - main
      - 12.x
      - 13.x

permissions:
  contents: write
  id-token: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node
          target-branch: ${{ github.ref_name }}
          versioning-strategy: ${{ (github.ref_name == '12.x' || github.ref_name == '13.x') && 'always-bump-patch' || 'default' }}

      - run: echo "Release created?... ${{ steps.release.outputs.release_created }}"

      # Steps below handle publication to NPM
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
        if: ${{ steps.release.outputs.release_created }}

      - run: npm ci
        if: ${{ steps.release.outputs.release_created }}

      - run: npm test
        if: ${{ steps.release.outputs.release_created }}

      - name: Publish to npm
        if: ${{ steps.release.outputs.release_created }}
        run: |
          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            npm publish --provenance
          else
            npm publish --provenance --tag "legacy-${GITHUB_REF_NAME%%.x}"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.UUID_NPM_RELEASE_TOKEN }}
